[project]
name = "datalake"
version = "0.1.0"
description = "Shared data lake library for S3-backed medallion architecture"
requires-python = ">=3.12"
dependencies = [
    "pyarrow>=18.0.0",
    "boto3>=1.35.0",
    "s3fs>=2024.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/datalake"]
