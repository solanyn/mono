name: Bazel
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  packages: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential
      - name: Setup Bazel
        run: |
          mkdir -p $HOME/bin && curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o $HOME/bin/bazel
          chmod +x $HOME/bin/bazel && echo "$HOME/bin" >> $GITHUB_PATH
      - name: Build all targets
        run: bazel build //... --config=ci 
      - name: Test all targets
        run: bazel test //... --config=ci 

  push-images:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: "${{ github.actor }}"
          password: "${{ github.token }}"
      - name: Setup Bazel
        run: |
          mkdir -p $HOME/bin && curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o $HOME/bin/bazel
          chmod +x $HOME/bin/bazel && echo "$HOME/bin" >> $GITHUB_PATH
      - name: Push OCI images
        run: |
          MONOREPO_VERSION=$(./tools/get-version.sh .)
          OCI_TARGETS=$(bazel query 'kind("oci_push", //...)' 2>/dev/null || echo "")
          if [ -z "$OCI_TARGETS" ]; then
            echo "No OCI push targets found"
            exit 0
          fi
          for target in $OCI_TARGETS; do
            echo "Pushing $target"
            bazel run $target --config=ci
            bazel run $target --config=ci -- --tag "$MONOREPO_VERSION"
            bazel run $target --config=ci -- --tag latest
          done

  deploy-resume:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Typst
        uses: typst-community/setup-typst@v5
      - name: Build PDF
        run: typst compile resume/resume.typ cv.pdf
      - name: Upload to R2
        run: |
          aws s3 cp cv.pdf s3://assets/cv.pdf \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}

  deploy-website:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bazel
        run: |
          mkdir -p $HOME/bin && curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o $HOME/bin/bazel
          chmod +x $HOME/bin/bazel && echo "$HOME/bin" >> $GITHUB_PATH
      - name: Build website
        run: bazel build //website:build --config=ci 
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy bazel-bin/website/dist --project-name=goyangi --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-preview:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bazel
        run: |
          mkdir -p $HOME/bin && curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o $HOME/bin/bazel
          chmod +x $HOME/bin/bazel && echo "$HOME/bin" >> $GITHUB_PATH
      - name: Build website
        run: bazel build //website:build --config=ci 
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Deploy preview to Cloudflare Pages
        id: deploy
        run: |
          OUTPUT=$(npx wrangler@latest pages deploy bazel-bin/website/dist --project-name=goyangi --branch=${{ github.head_ref }} --commit-dirty=true)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^ ]*\.pages\.dev' | tail -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.url }}';
            if (!previewUrl) return;
            const body = `🚀 Preview deployed to: ${previewUrl}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Preview deployed to:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  release:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bazel
        run: |
          mkdir -p $HOME/bin && curl -fsSL https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o $HOME/bin/bazel
          chmod +x $HOME/bin/bazel && echo "$HOME/bin" >> $GITHUB_PATH
      - name: Build kobo binaries
        run: |
          bazel build //kobo/kobo-dash:kobo-dash_linux_arm --config=ci
      - name: Build scrib-server
        run: |
          bazel build //scrib:scrib-server --config=ci
      - name: Generate version
        id: version
        run: |
          VERSION=$(date -u +%Y.%m).$(git rev-list --count HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            bazel-bin/kobo/kobo-dash/kobo-dash_linux_arm
            bazel-bin/scrib/scrib-server_/scrib-server

  release-scrib-client:
    runs-on: macos-latest
    needs: [test, release]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: scrib/go.mod
          cache-dependency-path: scrib/go.sum
      - name: Generate version
        id: version
        run: |
          VERSION=$(date -u +%Y.%m).$(git rev-list --count HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Build scrib (darwin/arm64)
        working-directory: scrib
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" -o scrib-darwin-arm64 .
      - name: Build scrib (darwin/amd64)
        working-directory: scrib
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: amd64
        run: go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" -o scrib-darwin-amd64 .
      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            scrib/scrib-darwin-arm64
            scrib/scrib-darwin-amd64
