---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    name: OpenCode
    runs-on: mono-runner
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install opencode
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(gh api repos/anomalyco/opencode/releases/latest --jq .tag_name)
          mkdir -p "$HOME/.opencode/bin"
          gh release download "$VERSION" --repo anomalyco/opencode --pattern "opencode-linux-x64.tar.gz" --dir /tmp
          tar -xzf /tmp/opencode-linux-x64.tar.gz -C "$HOME/.opencode/bin"
          chmod +x "$HOME/.opencode/bin/opencode"
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run OpenCode
        env:
          AGENTGATEWAY_API_KEY: ${{ secrets.AGENTGATEWAY_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          MODEL: agentgateway/opus
          USE_GITHUB_TOKEN: "true"
        run: opencode github run
