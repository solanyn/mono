name: Scrib
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scrib/**"
  pull_request:
    branches: [main]
    paths:
      - "scrib/**"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: scrib/go.mod
          cache-dependency-path: scrib/go.sum
      - name: Build
        working-directory: scrib
        run: go build ./cmd/scrib-server ./server/... ./config/... ./sync/... ./store/...
  push:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: scrib
          file: scrib/Dockerfile.server
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/solanyn/scrib-server:latest
            ghcr.io/solanyn/scrib-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
