name: Scrib
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scrib/**"
  pull_request:
    branches: [main]
    paths:
      - "scrib/**"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Build
        run: bazel build //scrib:scrib-server --config=ci
  push:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Compute version
        id: version
        run: |
          VERSION=$(./tools/get-version.sh .)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"
      - name: Push image
        env:
          DOCKER_CONFIG: /home/runner/.docker
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bazel run //scrib:push_server --config=ci -- --tag "$VERSION"
          bazel run //scrib:push_server --config=ci -- --tag latest
