name: Macro
on:
  push:
    branches: [main]
    paths:
      - "macro/**"
      - "libs/datalake/**"
  pull_request:
    branches: [main]
    paths:
      - "macro/**"
      - "libs/datalake/**"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  packages: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv pip install --system -e libs/datalake -e "macro[dev]"
      - name: Run tests
        run: python -m pytest libs/datalake/tests/ macro/tests/ -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: macro/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/solanyn/macro:sha-${{ github.sha }}
            ghcr.io/solanyn/macro:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
