name: Lake
on:
  push:
    branches: [main]
    paths:
      - "lake/**"
      - "lake-mcp/**"
      - "libs/datalake/**"
  pull_request:
    branches: [main]
    paths:
      - "lake/**"
      - "lake-mcp/**"
      - "libs/datalake/**"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  packages: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
      - name: Build
        run: bazel build //lake:ingest //lake:promote //lake:aggregate //lake-mcp:mcp_server --config=ci --config=remote --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
      - name: Test
        run: bazel test //lake-mcp:all --config=ci --config=remote --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
      - name: Get version
        id: version
        run: echo "version=$(./tools/get-version.sh .)" >> "$GITHUB_OUTPUT"
      - name: Push lake-ingest
        run: |
          bazel run //lake:push_ingest --config=ci -- --tag "sha-${{ github.sha }}"
          bazel run //lake:push_ingest --config=ci -- --tag "${{ steps.version.outputs.version }}"
          bazel run //lake:push_ingest --config=ci -- --tag latest
      - name: Push lake-promote
        run: |
          bazel run //lake:push_promote --config=ci -- --tag "sha-${{ github.sha }}"
          bazel run //lake:push_promote --config=ci -- --tag "${{ steps.version.outputs.version }}"
          bazel run //lake:push_promote --config=ci -- --tag latest
      - name: Push lake-aggregate
        run: |
          bazel run //lake:push_aggregate --config=ci -- --tag "sha-${{ github.sha }}"
          bazel run //lake:push_aggregate --config=ci -- --tag "${{ steps.version.outputs.version }}"
          bazel run //lake:push_aggregate --config=ci -- --tag latest
      - name: Push lake-mcp
        run: |
          bazel run //lake-mcp:push --config=ci -- --tag "sha-${{ github.sha }}"
          bazel run //lake-mcp:push --config=ci -- --tag "${{ steps.version.outputs.version }}"
          bazel run //lake-mcp:push --config=ci -- --tag latest
