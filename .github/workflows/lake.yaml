name: Lake
on:
  push:
    branches: [main]
    paths:
      - "lake/**"
      - "libs/datalake/**"
  pull_request:
    branches: [main]
    paths:
      - "lake/**"
      - "libs/datalake/**"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  packages: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv pip install --system -e libs/datalake -e "lake[dev]"
      - name: Run tests
        run: python -m pytest libs/datalake/tests/ lake/tests/ -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
      - name: Build image
        run: bazel build //lake:image --config=ci --config=remote --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
      - name: Push image
        run: |
          MONOREPO_VERSION=$(./tools/get-version.sh .)
          bazel run //lake:push --config=ci -- --tag "sha-${{ github.sha }}"
          bazel run //lake:push --config=ci -- --tag "$MONOREPO_VERSION"
          bazel run //lake:push --config=ci -- --tag latest
