name: Lake
on:
  push:
    branches: [main]
    paths:
      - "lake/**"
      - "lake-mcp/**"
      - "libs/datalake/**"
  pull_request:
    branches: [main]
    paths:
      - "lake/**"
      - "lake-mcp/**"
      - "libs/datalake/**"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  packages: write
jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: lake/go.mod
      - name: Build
        run: go build ./cmd/ingest/
        working-directory: lake
      - name: Test
        run: go test ./...
        working-directory: lake

  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install dependencies
        run: uv pip install --system -e libs/datalake -e "lake-mcp[dev]"
      - name: Run tests
        run: python -m pytest libs/datalake/tests/ lake-mcp/tests/ -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-go, test-python]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
      - name: Get version
        id: version
        run: echo "version=$(./tools/get-version.sh .)" >> "$GITHUB_OUTPUT"
      - name: Build and push lake-ingest
        uses: docker/build-push-action@v6
        with:
          context: lake
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/solanyn/lake-ingest:sha-${{ github.sha }}
            ghcr.io/solanyn/lake-ingest:${{ steps.version.outputs.version }}
            ghcr.io/solanyn/lake-ingest:latest
      - name: Build and push lake-mcp
        run: |
          bazel build //lake-mcp:image --config=ci --config=remote --remote_header=x-buildbuddy-api-key=${{ secrets.BUILDBUDDY_API_KEY }}
          bazel run //lake-mcp:push --config=ci -- --tag "sha-${{ github.sha }}"
          bazel run //lake-mcp:push --config=ci -- --tag "${{ steps.version.outputs.version }}"
          bazel run //lake-mcp:push --config=ci -- --tag latest
