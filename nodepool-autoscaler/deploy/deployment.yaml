apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodepool-autoscaler
  namespace: nodepool-autoscaler-system
  labels:
    app.kubernetes.io/name: nodepool-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nodepool-autoscaler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nodepool-autoscaler
    spec:
      serviceAccountName: nodepool-autoscaler
      containers:
        - name: manager
          image: ghcr.io/solanyn/nodepool-autoscaler:latest
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
