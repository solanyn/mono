apiVersion: v1
kind: ServiceAccount
metadata:
  name: nodepool-autoscaler
  namespace: nodepool-autoscaler-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nodepool-autoscaler
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling.home-ops.io"]
    resources: ["nodepoolscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling.home-ops.io"]
    resources: ["nodepoolscalers/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nodepool-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nodepool-autoscaler
subjects:
  - kind: ServiceAccount
    name: nodepool-autoscaler
    namespace: nodepool-autoscaler-system
